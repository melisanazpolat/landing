<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Landing Page</title>

  <link href="https://fonts.googleapis.com/css?family=Chivo:700|Overpass:400,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="banner">
    <div class="container">
      <h1>Discover Beautiful Places</h1>
      <p>Travel around the world with unforgettable experiences.</p>
      <a href="https://www.google.com" class="button-blue">Start Exploring</a>
    </div>
  </div>

  <div class="container">
    <h2>Our Destinations</h2>

    <div class="cards">

      <div class="card-white">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600" alt="Mountains">
        <h3>Mountains</h3>
      </div>

      <div class="card-white">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600" alt="Beach">
        <h3>Beach</h3>
      </div>

      <div class="card-white">
        <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=600" alt="Forest">
        <h3>Forest</h3>
      </div>

    </div>
  </div>

  <div class="footer">
    <p>Website made with ❤️ at Le Wagon</p>
  </div>

</body>
</html>
